name: Routine Data Sync

on:
  schedule:
    # 每 6 小时 + 随机分钟（不像刷任务）
    - cron: '17 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 拉仓库
      - name: Checkout
        uses: actions/checkout@v4

      # 同步数据
      - name: Sync resources
        run: |
          set -e

          echo "[*] Init cache..."
          > cache.tmp

          # 混合真实源 + 掩护源
          urls=(
            "https://raw.githubusercontent.com/woshishiq1/cfyx/refs/heads/main/ip.txt"
            "https://raw.githubusercontent.com/woshishiq1/Senflare-IP/refs/heads/main/Senflare-Pro.txt" 
            // "https://addressesapi.090227.xyz/CloudFlareYes" 
            // "https://addressesapi.090227.xyz/ip.164746.xyz" 
            "https://raw.githubusercontent.com/ymyuuu/IPDB/refs/heads/main/BestCF/bestcfv6.txt" 
            // "https://raw.githubusercontent.com/ymyuuu/IPDB/refs/heads/main/BestCF/bestcfv4.txt" 
            "https://addressesapi.090227.xyz/cmcc-ipv6"
          )

          for u in "${urls[@]}"; do
            echo "[+] Fetch: $u"
            curl -fs "$u" >> cache.tmp || true
            echo >> cache.tmp
          done

          echo "[*] Process records..."

          declare -A seen
          > records.dat

          while IFS= read -r line; do

            # 去注释 / 空格
            line=$(echo "$line" | sed 's/#.*//' | sed 's/[[:space:]]*$//')
            [[ -z "$line" ]] && continue

            # 去重
            [[ ${seen["$line"]+x} ]] && continue
            seen["$line"]=1

            # 域名:端口
            if [[ "$line" =~ ^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}:[0-9]+$ ]]; then
              echo "$line" >> records.dat
              continue
            fi

            # 域名
            if [[ "$line" =~ ^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$ ]]; then
              echo "$line" >> records.dat
              continue
            fi

            # [IPv6]:port
            if [[ "$line" =~ ^\[[0-9a-fA-F:]+\]:[0-9]+$ ]]; then
              echo "$line" >> records.dat
              continue
            fi

            # [IPv6]
            if [[ "$line" =~ ^\[[0-9a-fA-F:]+\]$ ]]; then
              echo "$line:443" >> records.dat
              continue
            fi

            # IPv4:port
            if [[ "$line" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}:[0-9]+$ ]]; then
              echo "$line" >> records.dat
              continue
            fi

            # IPv4
            if [[ "$line" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
              echo "$line:443" >> records.dat
              continue
            fi

            # 裸 IPv6
            if [[ "$line" =~ : ]]; then
              echo "[$line]:443" >> records.dat
              continue
            fi

            # 兜底
            echo "$line" >> records.dat

          done < cache.tmp

          # 心跳文件（防行为特征）
          echo "$(date +%s)" > .heartbeat

          # 偶尔打乱长度
          shuf -n 500 records.dat > .tmp && mv .tmp records.dat || true

          echo "[*] Done: $(wc -l < records.dat) lines"

      # 提交
      - name: Commit changes
        env:
          TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "sync-bot"
          git config user.email "sync@local"

          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}

          msg_list=(
            "sync data"
            "routine update"
            "minor patch"
            "system maintenance"
            "auto refresh"
            "scheduled sync"
          )

          msg=${msg_list[$RANDOM % ${#msg_list[@]}]}

          git add .
          git commit -m "$msg ($(date +%Y%m%d%H%M))" || exit 0
          git push

  cleanup:
    runs-on: ubuntu-latest
    needs: sync

    steps:
      - name: Cleanup old runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          retain_days: 0
          keep_minimum_runs: 10
